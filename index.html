<style>
/* ─── BASE ─── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
html,body{margin:0;padding:0;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;background:#050010;overscroll-behavior:none;}
#root{background:#050010;min-height:100dvh;color:#fff;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;max-height:100dvh;}
.screen.active{display:flex;}
button{font-family:inherit;cursor:pointer;transition:all 0.15s;}
button:active{transform:scale(0.93);}
input{font-family:inherit;}

/* ─── NEON COLOR VARS ─── */
:root{
  --neon-red:#FF2D55;
  --neon-pink:#FF6EC7;
  --neon-cyan:#00F5FF;
  --neon-blue:#3D5AFE;
  --neon-purple:#D500F9;
  --neon-yellow:#FFE600;
  --neon-green:#00E676;
  --neon-orange:#FF6D00;
  --dark-bg:#050010;
  --panel-bg:rgba(5,0,20,0.85);
  --border-dim:rgba(255,255,255,0.08);
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,46,85,0.4);border-radius:2px;}

/* ─── KEYFRAMES ─── */
@keyframes neonFlicker{
  0%,19%,21%,23%,25%,54%,56%,100%{opacity:1;text-shadow:0 0 7px #fff,0 0 15px #fff,0 0 30px var(--neon-red),0 0 60px var(--neon-red),0 0 80px var(--neon-red);}
  20%,24%{opacity:0.6;text-shadow:none;}
  55%{opacity:0.85;text-shadow:0 0 5px var(--neon-red);}
}
@keyframes neonFlickerPink{
  0%,18%,20%,22%,60%,100%{opacity:1;}
  19%,21%{opacity:0.5;}
}
@keyframes signGlow{
  0%,100%{box-shadow:0 0 8px currentColor,0 0 20px currentColor,inset 0 0 8px rgba(255,255,255,0.05);}
  50%{box-shadow:0 0 15px currentColor,0 0 40px currentColor,0 0 60px currentColor,inset 0 0 15px rgba(255,255,255,0.1);}
}
@keyframes streetFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes bounceIn{0%{transform:scale(0.4) rotate(-5deg);opacity:0;}65%{transform:scale(1.08) rotate(1deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
@keyframes slideUp{0%{transform:translateY(24px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes cardPop{0%{transform:scale(0.3) rotate(-8deg);opacity:0;}60%{transform:scale(1.08) rotate(2deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes cardFadeOut{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0.85);}}
@keyframes letsgoPop{0%{transform:scale(0.5);opacity:0;}30%{transform:scale(1.3);opacity:1;}70%{transform:scale(1.1);opacity:1;}100%{transform:scale(2.5);opacity:0;}}
@keyframes fogDrift{0%{transform:translateX(-10%) scaleY(1);}100%{transform:translateX(10%) scaleY(1.1);}}
@keyframes shimmer{0%{left:-100%;}100%{left:200%;}}
@keyframes pulse{0%,100%{opacity:0.7;}50%{opacity:1;}}
@keyframes timerDanger{0%,100%{color:#FF2D55;text-shadow:0 0 10px #FF2D55,0 0 30px #FF2D55;}50%{color:#fff;text-shadow:0 0 5px #FF2D55;}}

.neon-flicker{animation:neonFlicker 4s infinite;}
.bounce-in{animation:bounceIn 0.42s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.slide-up{animation:slideUp 0.28s ease-out;}
.card-pop{animation:cardPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.card-fadeout{animation:cardFadeOut 0.3s ease-in forwards;}

/* ─── NEON TEXT UTILITY ─── */
.t-neon-red{color:var(--neon-red);text-shadow:0 0 6px var(--neon-red),0 0 20px var(--neon-red);}
.t-neon-cyan{color:var(--neon-cyan);text-shadow:0 0 6px var(--neon-cyan),0 0 20px var(--neon-cyan);}
.t-neon-pink{color:var(--neon-pink);text-shadow:0 0 6px var(--neon-pink),0 0 20px var(--neon-pink);}
.t-neon-yellow{color:var(--neon-yellow);text-shadow:0 0 6px var(--neon-yellow),0 0 16px var(--neon-yellow);}

/* ─── NEON BUTTON ─── */
.btn-neon{
  position:relative;overflow:hidden;
  border-radius:6px;font-weight:900;letter-spacing:0.05em;
  border:2px solid currentColor;background:transparent;
  transition:all 0.15s;
}
.btn-neon::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:none;
}
.btn-neon:active::before{left:200%;transition:left 0.4s ease;}
.btn-neon:active{box-shadow:0 0 20px currentColor,inset 0 0 10px rgba(255,255,255,0.1);}

/* ─── NEON SIGN BOX ─── */
.neon-sign{
  border:2px solid currentColor;border-radius:4px;
  padding:4px 10px;font-weight:900;letter-spacing:0.08em;
  animation:signGlow 2.5s ease-in-out infinite;
}

/* ─── PANEL ─── */
.panel{background:var(--panel-bg);border:1px solid var(--border-dim);border-radius:8px;}

/* ─── START SCREEN ─── */
#screen-start{
  position:relative;
  background:#050010;
  align-items:center;justify-content:center;
  overflow:hidden;
}

/* 夜の路地背景 */
.night-city{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;
}
/* アスファルト床 */
.night-city::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30%;
  background:linear-gradient(180deg,transparent,rgba(255,46,85,0.04) 40%,rgba(0,0,0,0.8));
}
/* 霧 */
.fog{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(180deg,transparent,rgba(80,0,120,0.18),rgba(20,0,40,0.35));
  animation:fogDrift 8s ease-in-out infinite alternate;
}

/* ネオン看板群 */
.signs-row{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-around;align-items:flex-start;
  padding-top:8px;
  gap:4px;
}
.sign{
  display:flex;flex-direction:column;align-items:center;gap:0;
  font-size:11px;font-weight:900;
}
.sign-pole{width:2px;background:rgba(120,120,140,0.4);}
.sign-box{
  padding:5px 10px;border-radius:3px;font-weight:900;letter-spacing:0.06em;
  border:2px solid currentColor;text-align:center;line-height:1.3;
  position:relative;overflow:hidden;
}
.sign-box::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,255,255,0.06),transparent 70%);
}
/* 反射（地面） */
.sign-reflect{
  opacity:0.15;transform:scaleY(-0.3) translateY(2px);filter:blur(1px);
  font-size:9px;letter-spacing:0.06em;font-weight:900;
  margin-top:1px;
}

/* ─── TETRIS SCREEN ─── */
#screen-tetris{
  background:
    radial-gradient(ellipse at 20% 0%,rgba(255,46,85,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 0%,rgba(61,90,254,0.08) 0%,transparent 50%),
    linear-gradient(180deg,#06001A 0%,#050010 100%);
  position:relative;overflow:hidden;
}
#screen-tetris::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px);
}

/* テトリスヘッダー */
.t-header{
  height:44px;padding:0 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,46,85,0.2);flex-shrink:0;
  background:rgba(5,0,16,0.9);
  position:relative;
}
.t-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon-red),transparent);}

/* スコア表示（居酒屋メニュー札風） */
.score-tag{
  text-align:center;background:rgba(255,46,85,0.08);
  border:1px solid rgba(255,46,85,0.3);border-radius:4px;
  padding:2px 8px;min-width:52px;
}
.score-tag .val{color:var(--neon-yellow);font-weight:900;font-size:14px;text-shadow:0 0 8px var(--neon-yellow);}
.score-tag .lbl{color:rgba(255,255,255,0.4);font-size:8px;letter-spacing:0.1em;}

/* NEXT看板 */
.next-label{
  font-size:9px;font-weight:900;text-align:center;margin-bottom:3px;letter-spacing:0.15em;
  color:var(--neon-cyan);text-shadow:0 0 8px var(--neon-cyan);
}

/* タッチボタン */
.ctrl-btn{
  border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.85);
  font-size:22px;display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
}
.ctrl-btn:active{
  background:rgba(255,46,85,0.2);border-color:var(--neon-red);
  box-shadow:0 0 12px var(--neon-red);color:#fff;
}
.ctrl-btn-rotate{color:var(--neon-yellow);border-color:rgba(255,230,0,0.3);}
.ctrl-btn-rotate:active{background:rgba(255,230,0,0.15);border-color:var(--neon-yellow);box-shadow:0 0 12px var(--neon-yellow);}
.ctrl-btn-drop{color:var(--neon-pink);border-color:rgba(255,110,199,0.3);font-size:12px;font-weight:700;}
.ctrl-btn-drop:active{background:rgba(255,110,199,0.15);border-color:var(--neon-pink);box-shadow:0 0 12px var(--neon-pink);}

/* テトリスキャンバス */
#tetris-canvas{
  border:1px solid rgba(255,46,85,0.5);border-radius:4px;
  background:#010008;display:block;flex-shrink:0;
  box-shadow:0 0 15px rgba(255,46,85,0.2),inset 0 0 30px rgba(0,0,0,0.5);
}
#next-canvas{
  border:1px solid rgba(0,245,255,0.3);border-radius:4px;
  background:#010008;display:block;
  box-shadow:0 0 8px rgba(0,245,255,0.15);
}

/* ゲームオーバー（閉店ガラガラ） */
.gameover-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.88);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:20;
}
.gameover-title{
  font-size:38px;font-weight:900;
  color:var(--neon-red);
  text-shadow:0 0 10px var(--neon-red),0 0 30px var(--neon-re
